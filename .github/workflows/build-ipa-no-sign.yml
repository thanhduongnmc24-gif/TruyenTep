name: Build Unsigned IPA and APK to Releases

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apps:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ./ipa

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ipa/package-lock.json

      # [MỚI] Cài đặt Java 17 để phục vụ cho việc build Android
      - name: Setup Java (For Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      # Bỏ cờ --platform ios đi để Expo đẻ ra cả 2 thư mục ios và android
      - name: Expo Prebuild
        run: npx expo prebuild --clean

      # ================== BẮT ĐẦU BUILD ANDROID ==================
      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p build
          # Copy file apk vừa tạo ra vào chung thư mục build với IPA
          cp android/app/build/outputs/apk/release/app-release.apk build/DemThep.apk

      # ================== BẮT ĐẦU BUILD IOS ==================
      - name: Install Pods
        run: |
          cd ios
          pod install

      - name: Force Disable Signing via Ruby
        run: |
          cd ios
          gem install xcodeproj
          ruby -e '
            require "xcodeproj"
            project_path = Dir.glob("*.xcodeproj").first
            project = Xcodeproj::Project.open(project_path)
            
            project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings["CODE_SIGN_STYLE"] = "Manual"
                config.build_settings["DEVELOPMENT_TEAM"] = ""
                config.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ""
                config.build_settings["CODE_SIGNING_REQUIRED"] = "NO"
                config.build_settings["CODE_SIGNING_ALLOWED"] = "NO"
              end
            end
            project.save
          '
          echo "✅ Đã ép tắt chứng chỉ bằng Ruby thành công!"

      - name: Build Archive (No Signing)
        run: |
          cd ios
          SCHEME=$(basename *.xcworkspace .xcworkspace)
          echo "Detected Scheme: $SCHEME"
          
          xcodebuild archive \
            -workspace *.xcworkspace \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath ../build/MyApp.xcarchive \
            -sdk iphoneos \
            -CODE_SIGNING_ALLOWED=NO \
            -CODE_SIGNING_REQUIRED=NO \
            -CODE_SIGN_IDENTITY=""

      - name: Create IPA from Archive
        run: |
          mkdir -p build/Payload
          mv build/MyApp.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r -9 DemThep.ipa Payload

      # ================== ĐẨY LÊN GITHUB RELEASES ==================
      - name: Generate Tag Name
        id: tag
        run: |
          echo "release_tag=build-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Bản Build ${{ steps.tag.outputs.release_tag }}
          body: "Bản build chứa file cài đặt cho cả 2 hệ điều hành."
          # [MỚI] Bắt thằng GitHub lấy cả 2 file ném lên Releases
          files: |
            ipa/build/DemThep.ipa
            ipa/build/DemThep.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}